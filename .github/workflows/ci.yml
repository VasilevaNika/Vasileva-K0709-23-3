name: CI

# Пайплайн запускается при:
# - любом push в любую ветку
# - открытии/обновлении pull request в main
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

# Переменные окружения для всего пайплайна.
# BOT_TOKEN — заглушка, нужна только для валидации pydantic-settings при импорте.
env:
  BOT_TOKEN: "test_token_for_ci_not_real"
  CELERY_BROKER_URL: "redis://localhost:6379/1"
  CELERY_RESULT_BACKEND: "redis://localhost:6379/2"

jobs:
  # ─── Job 1: Линтинг ────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Run ruff (ошибки синтаксиса, неиспользуемые импорты)
        run: ruff check app/ tests/ --select E,F,W --ignore E501,W291,W293

  # ─── Job 2: Тесты ──────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    # Тесты запускаются после линтинга, чтобы не тратить минуты на тесты
    # если в коде есть синтаксические ошибки.
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies (pytest, fakeredis, aiosqlite)
        run: pip install -r requirements-dev.txt

      - name: Run tests with verbose output
        run: pytest tests/ -v --tb=short

  # ─── Job 3: Сборка Docker-образа ───────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Сборка образа проверяет, что Dockerfile корректен и все зависимости
    # устанавливаются. Запускается параллельно с тестами.
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dating-bot:ci-${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run --rm \
            -e BOT_TOKEN=test_token \
            dating-bot:ci-${{ github.sha }} \
            python -c "import app.bot; print('Import OK')"
