services:
  postgres:
    image: postgres:16-alpine
    container_name: dating_bot_db
    environment:
      POSTGRES_DB: dating_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dating_bot_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── MinIO — объектное хранилище фотографий ───────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: dating_bot_minio
    # server /data — директория с данными внутри контейнера
    # --console-address ":9001" — веб-интерфейс MinIO на порту 9001
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API — используется ботом и SDK
      - "9001:9001"   # MinIO Web Console — http://localhost:9001
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── createbuckets — одноразовый init-контейнер ───────────────────────────
  # Запускается один раз после старта MinIO и создаёт нужный bucket.
  # Устанавливает политику public-read, чтобы фото были доступны по прямому URL.
  createbuckets:
    image: minio/mc:latest
    container_name: dating_bot_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/dating-photos --ignore-existing;
      mc anonymous set public local/dating-photos;
      echo 'Bucket dating-photos готов.';
      "

  # ─── Celery worker — выполняет задачи из очереди ──────────────────────────
  celery_worker:
    build: .
    container_name: dating_bot_celery_worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dating_bot
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: dating-photos
      MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── Celery beat — планировщик периодических задач ────────────────────────
  celery_beat:
    build: .
    container_name: dating_bot_celery_beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dating_bot
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: dating-photos
      MINIO_SECURE: "false"
    depends_on:
      - celery_worker

volumes:
  pgdata:
  redisdata:
  miniodata:
